name: Playwright Tests

# 🚀 Trigger conditions
on:
  push:
    branches: [main]   # Runs every time you push to main branch
  schedule:
    - cron: "0 0 * * *"  # Runs daily at 00:00 UTC (3 AM Amman time)
  workflow_dispatch:     # Allows manual run from GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest  # 🖥️ GitHub hosted Linux machine
    timeout-minutes: 30     # ⏱️ Stops job if it takes more than 30 minutes

    steps:
      # 📥 Step 1: Get your code from repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🟢 Step 2: Install Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 Step 3: Install project dependencies from package.json
      - name: Install dependencies
        run: npm install

      # 🎭 Step 4: Install Playwright browsers (Chromium, Firefox, WebKit)
      # --with-deps installs system dependencies needed on Ubuntu runner
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 🧪 Step 5: Run Playwright tests
      # --reporter=html generates HTML report automatically
      - name: Run Playwright tests
        run: npx playwright test --reporter=html

      # 📊 Step 6: Upload test report as GitHub artifact
      # if: always() ensures report is uploaded even if tests fail
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report   # Name shown in GitHub artifacts
          path: playwright-report/  # Folder generated by Playwright
          retention-days: 14        # Keep report for 14 days